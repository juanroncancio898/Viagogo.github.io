<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Boletos</title>
    <link rel="icon" type="image/png" href="assets/img/Via.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/big.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .ticket-form-container {
            max-width: 600px;
            margin: 48px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
            padding: 42px 36px 32px 36px;
        }
        .ticket-form-container h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            margin-bottom: 7px;
            color: #333;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 7px;
            font-size: 1rem;
            background: #f8f9fa;
            transition: border 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #3498db;
            outline: none;
            background: #fff;
        }
        .form-row {
            display: flex;
            gap: 18px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .submit-btn {
            width: 100%;
            background: #3498db;
            color: #fff;
            border: none;
            padding: 15px 0;
            border-radius: 7px;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 18px;
        }
        .submit-btn:hover {
            background: #217dbb;
        }
        @media (max-width: 600px) {
            .ticket-form-container {
                padding: 18px 6vw;
            }
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="nav-left">
            <a href="index.html"><img src="assets/img/Logo.png" alt="viagogo Logo" class="logo-image"></a>
            <a href="#">Deportes</a>
            <a href="#">Conciertos</a>
            <a href="#">Teatro</a>
            <a href="#">Ciudades Principales</a>
        </div>
        <div class="nav-right">
            <a href="#">Explorar</a>
            <a href="#">Vender</a>
            <a href="#">Favoritos</a>
        </div>
    </header>
    <main>
        <div class="ticket-form-container">
            <h2>Formulario de Compra de Boletos</h2>
            <form id="formBoletos">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="partido">Partido que va a ver</label>
                            <select id="partido" name="partido" required>
                                <option value="MEX vs RSA $3000">MEX vs RSA $3000</option>
                                <option value="KOR vs TBD $1200">KOR vs TBD $1200</option>
                                <option value="CAN vs TBD $1000">CAN vs TBD $1000</option>
                                <option value="USA vs PAR $2500">USA vs PAR $2500</option>
                                <option value="QAT vs SUI $1200">QAT vs SUI $1200</option>
                                <option value="BRA vs MAR $2800">BRA vs MAR $2800</option>
                                <option value="AUS vs TBD $1200">AUS vs TBD $1200</option>
                                <option value="HAI vs SCO $900">HAI vs SCO $900</option>
                                <option value="GER vs CUW $2000">GER vs CUW $2000</option>
                                <option value="NED vs JPN $3000">NED vs JPN $3000</option>
                                <option value="CIV vs ECU $1500">CIV vs ECU $1500</option>
                                <option value="TBD vs TUN $800">TBD vs TUN $800</option>
                                <option value="BEL vs EGY $2000">BEL vs EGY $2000</option>
                                <option value="ESP vs TBD $1800">ESP vs TBD $1800</option>
                                <option value="IRN vs NZL $900">IRN vs NZL $900</option>
                                <option value="KSA vs URU $2500">KSA vs URU $2500</option>
                                <option value="FRA vs SEN $3000">FRA vs SEN $3000</option>
                                <option value="TBD vs NOR $800">TBD vs NOR $800</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="cantidad">Cantidad de boletos</label>
                            <input type="number" id="cantidad" name="cantidad" min="1" max="20" value="1" required>
                        </div>
                    </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="nombre">Nombre completo</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="direccion">Dirección</label>
                        <input type="text" id="direccion" name="direccion" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="departamento">Departamento</label>
                        <select id="departamento" name="departamento" required>
                            <option value="">Selecciona...</option>
                            <option value="Amazonas">Amazonas</option>
                            <option value="Antioquia">Antioquia</option>
                            <option value="Atlántico">Atlántico</option>
                            <option value="Bogotá D.C.">Bogotá D.C.</option>
                            <option value="Bolívar">Bolívar</option>
                            <option value="Boyacá">Boyacá</option>
                            <option value="Caldas">Caldas</option>
                            <option value="Caquetá">Caquetá</option>
                            <option value="Casanare">Casanare</option>
                            <option value="Cauca">Cauca</option>
                            <option value="Cesar">Cesar</option>
                            <option value="Chocó">Chocó</option>
                            <option value="Córdoba">Córdoba</option>
                            <option value="Cundinamarca">Cundinamarca</option>
                            <option value="Guainía">Guainía</option>
                            <option value="Guaviare">Guaviare</option>
                            <option value="Huila">Huila</option>
                            <option value="La Guajira">La Guajira</option>
                            <option value="Magdalena">Magdalena</option>
                            <option value="Meta">Meta</option>
                            <option value="Nariño">Nariño</option>
                            <option value="Norte de Santander">Norte de Santander</option>
                            <option value="Putumayo">Putumayo</option>
                            <option value="Quindío">Quindío</option>
                            <option value="Risaralda">Risaralda</option>
                            <option value="San Andrés y Providencia">San Andrés y Providencia</option>
                            <option value="Santander">Santander</option>
                            <option value="Sucre">Sucre</option>
                            <option value="Tolima">Tolima</option>
                            <option value="Valle del Cauca">Valle del Cauca</option>
                            <option value="Vaupés">Vaupés</option>
                            <option value="Vichada">Vichada</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="ciudad">Ciudad</label>
                        <input type="text" id="ciudad" name="ciudad" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="telefono">Número de teléfono</label>
                        <input type="tel" id="telefono" name="telefono" pattern="[0-9]{7,10}" required>
                    </div>
                    <div class="form-group">
                        <label for="correo">Correo electrónico</label>
                        <input type="email" id="correo" name="correo" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="documento">Tipo de documento</label>
                        <select id="documento" name="documento" required>
                            <option value="">Selecciona...</option>
                            <option value="CC">Cédula de ciudadanía</option>
                            <option value="CE">Cédula de extranjería</option>
                            <option value="TI">Tarjeta de identidad</option>
                            <option value="Pasaporte">Pasaporte</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="numero_documento">Número de documento</label>
                        <input type="text" id="numero_documento" name="numero_documento" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="fecha_nacimiento">Fecha de nacimiento</label>
                        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Comprar Boleto</button>
                <div id="descripcion-partido" class="descripcion-partido" style="margin-top:28px; font-size:1.08rem; color:#2c3e50; background:#f8f9fa; border-radius:8px; padding:18px; display:none;"></div>
            </form>
        </div>
        <script>
        // Descripciones de partidos
                    // Redirigir a la pasarela de pago con los datos
                    document.getElementById('formBoletos').addEventListener('submit', function(e) {
                        e.preventDefault();
                        const get = id => encodeURIComponent(document.getElementById(id)?.value || '');
                        const partido = get('partido');
                        const cantidad = get('cantidad');
                        const nombre = get('nombre');
                        const direccion = get('direccion');
                        const departamento = get('departamento');
                        const ciudad = get('ciudad');
                        const telefono = get('telefono');
                        const correo = get('correo');
                        const documento = get('documento');
                        const numero_documento = get('numero_documento');
                        const fecha_nacimiento = get('fecha_nacimiento');
                        let total = '';
                        if (descripciones[document.getElementById('partido').value]) {
                            total = descripciones[document.getElementById('partido').value].precio * (parseInt(document.getElementById('cantidad').value)||1);
                        }
                        const params = `partido=${partido}&cantidad=${cantidad}&nombre=${nombre}&direccion=${direccion}&departamento=${departamento}&ciudad=${ciudad}&telefono=${telefono}&correo=${correo}&documento=${documento}&numero_documento=${numero_documento}&fecha_nacimiento=${fecha_nacimiento}&total=${total}`;
                        window.location.href = `pago.html?${params}`;
                    });
            const descripciones = {

                    precio: 3000

                "KOR vs TBD $1200": {

                    precio: 1200
                },
                "CAN vs TBD $1000": {
                    texto: "<b>CAN vs TBD</b><br>Fecha: 12 de junio<br>Hora: 15:00<br>Ciudad: Toronto, Canadá<br>Estadio: BMO Field<br>Precio: $1000",
                    precio: 1000
                },
                "USA vs PAR $2500": {
                    texto: "<b>USA vs PAR</b><br>Fecha: 12 de junio<br>Hora: 18:00<br>Ciudad: Inglewood, CA, EE. UU.<br>Estadio: SoFi Stadium<br>Precio: $2500",
                    precio: 2500
                },
                "QAT vs SUI $1200": {
                    texto: "<b>QAT vs SUI</b><br>Fecha: 13 de junio<br>Hora: 12:00<br>Ciudad: Santa Clara, CA, EE. UU.<br>Estadio: Levi's Stadium<br>Precio: $1200",
                    precio: 1200
                },
                "BRA vs MAR $2800": {
                    texto: "<b>BRA vs MAR</b><br>Fecha: 13 de junio<br>Hora: 18:00<br>Ciudad: East Rutherford, NJ, EE. UU.<br>Estadio: MetLife Stadium<br>Precio: $2800",
                    precio: 2800
                },
                "AUS vs TBD $1200": {
                    texto: "<b>AUS vs TBD</b><br>Fecha: 13 de junio<br>Hora: 21:00<br>Ciudad: Vancouver, Canadá<br>Estadio: BC Place Stadium<br>Precio: $1200",
                    precio: 1200
                },
                "HAI vs SCO $900": {

                    precio: 900
                },
                "GER vs CUW $2000": {
                    texto: "<b>GER vs CUW</b><br>Fecha: 14 de junio<br>Hora: 12:00<br>Ciudad: Houston, TX, EE. UU.<br>Estadio: NRG Stadium<br>Precio: $2000",

                "NED vs JPN $3000": {

                    precio: 3000

                "BEL vs EGY $2000": {

                    precio: 3000
                },
                "TBD vs NOR $800": {
                    texto: "<b>TBD vs NOR</b><br>Fecha: 16 de junio<br>Hora: 18:00<br>Ciudad: Foxborough, MA, EE. UU.<br>Estadio: Gillette Stadium<br>Precio: $800",
                    precio: 800
                }
            };
            function actualizarDescripcion() {
                const partido = document.getElementById('partido').value;
                const cantidad = parseInt(document.getElementById('cantidad').value) || 1;
                const descDiv = document.getElementById('descripcion-partido');
                if (descripciones[partido]) {
                    const total = descripciones[partido].precio * cantidad;
                    descDiv.innerHTML = descripciones[partido].texto + `<br><b>Cantidad de boletos:</b> ${cantidad}<br><b>Total a pagar:</b> $${total}`;
                    descDiv.style.display = 'block';
                } else {
                    descDiv.innerHTML = '';
                    descDiv.style.display = 'none';
                }
            }
            document.getElementById('partido').addEventListener('change', actualizarDescripcion);
            document.getElementById('cantidad').addEventListener('input', actualizarDescripcion);
        // Eliminar eventListener duplicado y usar solo actualizarDescripcion
        </script>
    </main>
    <footer class="footer">
        <div class="footer-content" style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 0 18px 0;">
            <img src="assets/img/Logo.png" alt="viagogo Logo" style="height:38px; margin-bottom:10px;">
            <p style="color:#666; font-size:1rem; margin:0;">© 2026 Viagogo. Todos los derechos reservados.</p>
            <p style="color:#aaa; font-size:0.95rem; margin:4px 0 0 0;">Compra y vende boletos de manera segura y sencilla.</p>
        </div>
    </footer>
</body>
</html>
